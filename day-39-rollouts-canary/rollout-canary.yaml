# Day 39 — canary Rollout with nginx traffic routing + analysis (reference solution)
# Requires: analysis-template.yaml applied first.
# Apply: kubectl apply -f rollout-canary.yaml
# Watch: kubectl argo rollouts get rollout podlab-canary -n rollouts-lab -w
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: podlab-canary
  namespace: rollouts-lab
spec:
  replicas: 4
  selector:
    matchLabels:
      app: podlab-canary
  template:
    metadata:
      labels:
        app: podlab-canary
    spec:
      containers:
        - name: podlab
          image: podlab:v1
          ports:
            - name: http          # named: the PodMonitor scrapes by port name
              containerPort: 8080
          env:
            - name: VERSION
              value: "1.0.0"      # RUN 1: "2.0.0" · RUN 2: "3.0.0"
            - name: COLOR
              value: "blue"       # RUN 1: "green" · RUN 2: "red"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
  strategy:
    canary:
      stableService: podlab-stable
      canaryService: podlab-canary-svc
      trafficRouting:
        nginx:
          stableIngress: podlab-stable   # controller clones this with canary annotations
      analysis:                          # BACKGROUND watchdog: continuous from step 1
        templates:
          - templateName: podlab-success-rate
        startingStep: 1
      steps:
        - setWeight: 20
        - pause: {duration: 1m}
        - analysis:                      # INLINE gate: one measurement must pass
            templates:
              - templateName: podlab-success-rate
        - setWeight: 50
        - pause: {duration: 1m}
        - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: podlab-stable
  namespace: rollouts-lab
spec:
  selector:
    app: podlab-canary   # controller adds rollouts-pod-template-hash (stable)
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: podlab-canary-svc
  namespace: rollouts-lab
spec:
  selector:
    app: podlab-canary   # controller adds rollouts-pod-template-hash (canary)
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podlab-stable
  namespace: rollouts-lab
spec:
  ingressClassName: nginx
  rules:
    - host: canary.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: podlab-stable
                port:
                  number: 80
