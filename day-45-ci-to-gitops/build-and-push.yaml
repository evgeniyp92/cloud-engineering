# Copy this file into your podlab app repo as .github/workflows/build-and-push.yaml
#
# Trigger: pushing a tag like v1.1.0
# Pipeline: checkout → buildx → login ghcr → build amd64+arm64 → trivy gate → push
#
# Note the order: we build and LOAD a single-arch image first so trivy can scan
# it locally, and only after the scan passes do we build+push the multi-arch
# manifest. Buildx caches the layers, so the second build is nearly free.

name: build-and-push

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/podlab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # lets GITHUB_TOKEN push to ghcr.io — no PAT needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (emulate arm64 on the amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          docker run --rm -v "$PWD":/src -w /src golang:1.23 go vet ./...
          docker run --rm -v "$PWD":/src -w /src golang:1.23 go test ./...

      - name: Build (local, single-arch) for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true        # load into the runner's docker so trivy can see it
          tags: ${{ env.IMAGE }}:scan

      - name: Trivy scan gate — fail on CRITICAL
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          exit-code: "1"          # any CRITICAL finding fails the job → nothing is pushed
          severity: CRITICAL
          ignore-unfixed: true    # don't fail on CVEs with no patched version yet

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # arm64: kind on Apple Silicon; amd64: real clusters
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
