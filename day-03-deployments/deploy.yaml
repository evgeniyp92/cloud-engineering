apiVersion: apps/v1
kind: Deployment
metadata:
  name: podlab
  labels:
    app: podlab
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  replicas: 3
  selector:
    matchLabels:
      app: podlab
  template:
    metadata:
      name: podlab
      labels:
        app: podlab
    spec:
      containers:
        - name: podlab
          image: podlab:v1
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: '1.0.0'
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }