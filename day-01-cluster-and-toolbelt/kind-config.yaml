# Day 1 — the long-lived "course" cluster.
# Create with:  kind create cluster --name course --config kind-config.yaml
#
# - 1 control-plane + 2 workers (real scheduling decisions need >1 node)
# - control-plane is labelled ingress-ready=true and maps host ports
#   8080→80 and 8443→443 so ingress-nginx (Day 5) is reachable at
#   http://localhost:8080 from your Mac.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
