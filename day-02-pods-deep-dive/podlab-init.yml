apiVersion: v1
kind: Pod
metadata:
  name: podlab-init
  labels:
    app: podlab
spec:
  containers:
    - name: wait-a-bit
      image: busybox
      command: ["sh", "-c", "echo waiting for imaginary dependency...; sleep 30; echo done"]
    - name: podlab
      image: podlab:v1
      ports:
        - containerPort: 8080
      env:
        - name: VERSION
          value: 1.0.0
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace