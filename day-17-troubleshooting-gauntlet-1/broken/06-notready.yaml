# Gauntlet 6/6 — "it's Running but never Ready"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-notready
  namespace: gauntlet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-notready
  template:
    metadata:
      labels:
        app: web-notready
    spec:
      containers:
      - name: podlab
        image: podlab:v1
        env:
        - name: PORT
          value: "9090"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-notready
  namespace: gauntlet
spec:
  selector:
    app: web-notready
  ports:
  - port: 80
    targetPort: 8080
