# Gauntlet 1/6 — "the release that never started"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-pull
  namespace: gauntlet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-pull
  template:
    metadata:
      labels:
        app: web-pull
    spec:
      containers:
      - name: podlab
        image: podlab:v1.0
        ports:
        - containerPort: 8080
