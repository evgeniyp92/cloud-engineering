# Gauntlet 4/6 — "the app is green but customers get nothing"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-noroute
  namespace: gauntlet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podlab
  template:
    metadata:
      labels:
        app: podlab
    spec:
      containers:
      - name: podlab
        image: podlab:v1
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-noroute
  namespace: gauntlet
spec:
  selector:
    app: podlb
  ports:
  - port: 80
    targetPort: 8080
